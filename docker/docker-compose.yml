services:
  celery-optimize-worker-1:
    image: tvorchalavka/file-optimizer:latest
    container_name: celery-optimize-worker-1
    command: /scripts/entrypoint.py --worker file-optimizer
    env_file: ../.env
    restart: always
    networks:
      - tvorcha-network
    volumes:
      - tvorcha-efs:/mnt/efs
    mem_limit: 512m
    cpus: 1.0


networks:
  tvorcha-network:
    external: true

volumes:
  tvorcha-efs:
    external: true